name: "NyxID"
description: "OpenRouter gives you one key for every model; NyxID lets you hand that key to every agent. Set it up once, then split it into scoped per-agent keys that proxy through NyxID — each agent uses the credential but never reads it, with per-agent isolation, rate limits, and audit."
